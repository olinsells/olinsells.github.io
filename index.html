<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olin Deals | Marketplace</title>
    <style>
        :root {
            --dark-blue: #0a192f;
            --light-blue: #112240;
            --accent-blue: #64ffda;
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
        }

        /* CHANGE 1: Prevent background scrolling */
        body.modal-open {
            overflow: hidden;
        }

        body {
            font-family: "Helvetica", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--dark-blue);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--light-blue);
            padding: 1rem 1.25rem;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-bottom: 2px solid var(--accent-blue);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            min-width: 0;
        }

        h1 { margin: 0; color: var(--accent-blue); letter-spacing: 1.5px; font-size: 1.6rem; line-height: 1.1; }
        p.subtitle { color: var(--text-dim); margin: 0; font-weight: 300; font-size: 0.95rem; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* CHANGE 2: Styling for the new About button */
        .upload-link, .about-link, .remove-link {
            display: inline-block;
            padding: 0.55rem 0.9rem;
            border: 1px solid var(--accent-blue);
            border-radius: 6px;
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 700;
            white-space: nowrap;
            transition: 0.25s ease;
        }

        .about-link {
            border-color: var(--text-dim);
            color: var(--text-dim);
        }

        .upload-link:hover, .about-link:hover {
            background-color: rgba(100, 255, 218, 0.1);
            color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .sheet-link {
            display: inline-block;
            padding: 0.55rem 0.9rem;
            border: 1px solid rgba(100, 255, 218, 0.55);
            border-radius: 6px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            white-space: nowrap;
            transition: 0.25s ease;
            background-color: rgba(100, 255, 218, 0.06);
        }

        .sheet-link:hover {
            border-color: var(--accent-blue);
            background-color: rgba(100, 255, 218, 0.12);
        }

        .container {
            max-width: 1800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--light-blue);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(100, 255, 218, 0.1);
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-blue);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            background-color: #000;
            display: block;
        }

        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .card-title {
            margin: 0;
            font-size: 1.2rem;
            line-height: 1.2;
            min-width: 0;
            text-align: left;
        }

        .price {
            color: var(--accent-blue);
            font-size: 1.4rem;
            font-weight: bold;
            margin: 0;
            text-align: right;
            white-space: nowrap;
        }

        .card-meta {
            margin-top: 0.5rem;
            padding-top: 0.25rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .card-meta-top {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .seller-name {
            font-weight: 700;
            color: var(--text-main);
            padding: 0.3rem 0 0.4rem;
        }

        .posted-date {
            font-size: 0.85rem;
            color: rgba(136, 146, 176, 0.95);
            font-weight: 400;
            text-align: right;
        }

        .meta-link {
            display: inline-block;
            padding: 0.45rem 0.9rem;
            border-radius: 999px;
            border: none;
            background-color: var(--accent-blue);
            color: #001018;
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .detail-contact {
            margin-top: 0.75rem;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .detail-email {
            font-size: 0.8rem;
            color: var(--text-dim);
            word-break: break-all;
            line-height: 1.4;
        }

        .detail-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(2, 12, 27, 0.8);
            display: none;
            align-items: flex-start;
            justify-content: center;
            z-index: 1500;
            overflow-y: auto;
            padding: 2rem 0;
        }

        .detail-backdrop.is-open { display: flex; }

        .detail-modal {
            background: var(--light-blue);
            border-radius: 16px;
            max-width: 900px;
            width: min(90vw, 900px);
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.4fr);
            overflow: hidden;
            border: 1px solid rgba(100, 255, 218, 0.35);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .detail-image-wrap { background: #000; aspect-ratio: 3 / 4; }
        .detail-image { width: 100%; height: 100%; object-fit: cover; display: block; }
        .detail-content { padding: 1.5rem 1.75rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .detail-title { margin: 0; font-size: 1.5rem; }
        .detail-price { margin: 0; color: var(--accent-blue); font-size: 1.2rem; font-weight: 700; }
        .detail-description { margin-top: 0.5rem; color: var(--text-dim); font-size: 0.95rem; line-height: 1.5; }

        .detail-close {
            position: absolute;
            top: 0.75rem;
            right: 1rem;
            background: rgba(10, 25, 47, 0.5);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            border: none;
            color: var(--text-dim);
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .detail-modal { grid-template-columns: 1fr; }
        }

        #loading { text-align: center; width: 100%; grid-column: 1/-1; padding: 3rem; color: var(--accent-blue); }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <h1>OLIN DEALS</h1>
        <p class="subtitle">Campus Marketplace MVP</p>
    </div>
    <div class="header-actions">
      <a class="about-link" href="about.html">About</a>
      <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1mtEPmFUPAOKuYkGwr9zl8f1lAaOpt8skmTvANqJe49Y/edit" target="_blank">View Spreadsheet</a>
      <a class="upload-link" href="https://docs.google.com/forms/u/0/d/e/1FAIpQLSfMfqlYGRJI_LrSlkTDkjyR75JHqUPSUjHDIee7M1deZP1z9A/viewform" target="_blank">Post an item</a>
      <a class="remove-link" href="remove_item.html">Remove a Listing</a>
    </div>
</header>

<div class="container" id="image-container">
    <div id="loading">Searching for items...</div>
</div>

<div class="detail-backdrop" id="detail-backdrop" aria-hidden="true">
  <div class="detail-modal" role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <div class="detail-image-wrap"><img id="detail-image" class="detail-image" alt=""></div>
    <div class="detail-content">
      <button class="detail-close" type="button" aria-label="Close">&times;</button>
      <h2 id="detail-title" class="detail-title"></h2>
      <p id="detail-price" class="detail-price"></p>
      <p id="detail-description" class="detail-description"></p>
      <div class="detail-contact">
        <a id="detail-inquire" class="meta-link" href="#">Inquire</a>
        <span class="detail-email">or email <span id="detail-email"></span></span>
      </div>
      <p id="detail-date" style="font-size: 0.85rem; color: var(--text-dim);"></p>
    </div>
  </div>
</div>

<script>
  function formatPrice(rawPrice) {
    if (rawPrice == null) return '';
    const trimmed = String(rawPrice).trim();
    if (!trimmed) return '';
    const numeric = Number(String(trimmed).replace(/[^0-9.-]/g, ''));
    if (!Number.isFinite(numeric)) return trimmed;
    const hasCents = Math.abs(numeric % 1) > 1e-9;
    return new Intl.NumberFormat('en-US', {
      style: 'currency', currency: 'USD',
      minimumFractionDigits: hasCents ? 2 : 0,
      maximumFractionDigits: hasCents ? 2 : 0,
    }).format(numeric);
  }

  function formatPostedDayOnly(timestamp) {
    if (timestamp == null) return '';
    const t = String(timestamp).trim();
    if (!t) return '';
    if (t.includes(' ')) return t.split(' ')[0];
    if (t.includes('T')) return t.split('T')[0];
    return t;
  }

  function setupDetailModal() {
    const backdrop = document.getElementById('detail-backdrop');
    const imgEl = document.getElementById('detail-image');
    const titleEl = document.getElementById('detail-title');
    const priceEl = document.getElementById('detail-price');
    const descEl = document.getElementById('detail-description');
    const dateEl = document.getElementById('detail-date');
    const inquireEl = document.getElementById('detail-inquire');
    const emailEl = document.getElementById('detail-email');
    const closeBtn = backdrop.querySelector('.detail-close');

    function close() {
      backdrop.classList.remove('is-open');
      // CHANGE 4: Re-enable scrolling
      document.body.classList.remove('modal-open');
    }

    function open(data) {
      titleEl.textContent = data.name;
      priceEl.textContent = data.price;
      descEl.textContent = data.description;
      dateEl.textContent = data.date ? `Posted ${data.date}` : '';
      emailEl.textContent = data.email;
      inquireEl.href = `mailto:${data.email}?subject=${encodeURIComponent('Olin Deals: ' + data.name)}`;
      imgEl.src = data.imageUrl || '';
      backdrop.classList.add('is-open');
      // CHANGE 5: Disable background scrolling
      document.body.classList.add('modal-open');
      backdrop.scrollTop = 0;
    }

    backdrop.onclick = (e) => { if (e.target === backdrop) close(); };
    closeBtn.onclick = close;
    return { open };
  }

  async function fetchData() {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/1mtEPmFUPAOKuYkGwr9zl8f1lAaOpt8skmTvANqJe49Y/values/Listings!A:H?key=AIzaSyBasUwah0wqiz_OHSCiLyr5YgP1HeiShZU`;
    try {
      const response = await fetch(url);
      const data = await response.json();
      const rows = data.values;
      if (!rows) return;
      const container = document.getElementById('image-container');
      container.innerHTML = '';
      const detail = setupDetailModal();

      rows.slice(1).forEach(row => {
        const productName = row[1];
        if (!productName) return;
        const fPrice = formatPrice(row[5]);
        const fDate = formatPostedDayOnly(row[0]);

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          ${row[7] ? `<img src="${row[7]}" class="card-img">` : ''}
          <div class="card-content">
            <div class="card-header"><h3 class="card-title">${productName}</h3><p class="price">${fPrice}</p></div>
            <div class="card-meta">
              <div class="card-meta-top"><div class="seller-name">${row[2]}</div><div class="posted-date">${fDate}</div></div>
              <div class="detail-contact">
                <a class="meta-link" href="mailto:${row[3]}?subject=Olin Deals: ${productName}">Inquire</a>
                <span class="detail-email">or email <span>${row[3]}</span></span>
              </div>
            </div>
          </div>
        `;
        card.addEventListener('click', (e) => {
          if (e.target.closest('.meta-link')) return;
          detail.open({ name: productName, description: row[6], date: fDate, price: fPrice, imageUrl: row[7], email: row[3] });
        });
        container.appendChild(card);
      });
    } catch (e) { console.error(e); }
  }
  fetchData();
</script>
</body>
</html>
