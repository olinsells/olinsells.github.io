<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olin Sells | Marketplace</title>
    <style>
        :root {
            --dark-blue: #0a192f;
            --light-blue: #112240;
            --accent-blue: #64ffda;
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
        }

        /* Addition 1: Prevent background from scrolling when modal is open */
        body.modal-open {
            overflow: hidden;
        }

        body {
            font-family: "Helvetica", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--dark-blue);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--light-blue);
            padding: 1rem 1.25rem;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-bottom: 2px solid var(--accent-blue);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            min-width: 0;
        }

        h1 { margin: 0; color: var(--accent-blue); letter-spacing: 1.5px; font-size: 1.6rem; line-height: 1.1; }
        p.subtitle { color: var(--text-dim); margin: 0; font-weight: 300; font-size: 0.95rem; }

        .upload-link {
            display: inline-block;
            padding: 0.55rem 0.9rem;
            border: 1px solid var(--accent-blue);
            border-radius: 6px;
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 700;
            white-space: nowrap;
            transition: 0.25s ease;
        }

        .upload-link:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .sheet-link {
            display: inline-block;
            padding: 0.55rem 0.9rem;
            border: 1px solid rgba(100, 255, 218, 0.55);
            border-radius: 6px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            white-space: nowrap;
            transition: 0.25s ease;
            background-color: rgba(100, 255, 218, 0.06);
        }

        .sheet-link:hover {
            border-color: var(--accent-blue);
            background-color: rgba(100, 255, 218, 0.12);
        }

        .container {
            max-width: 1800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--light-blue);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(100, 255, 218, 0.1);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-blue);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            background-color: #000;
            display: block;
        }

        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .card-title {
            margin: 0;
            font-size: 1.2rem;
            line-height: 1.2;
            min-width: 0;
            text-align: left;
        }

        .price {
            color: var(--accent-blue);
            font-size: 1.4rem;
            font-weight: bold;
            margin: 0;
            text-align: right;
            white-space: nowrap;
        }

        h3 { margin: 0.5rem 0; font-size: 1.2rem; }

        .description {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0.25rem 0 0.75rem;
            flex-grow: 1;
        }

        .card-meta {
            margin-top: 0.5rem;
            padding-top: 0.25rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .card-meta-top {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .seller-name {
            font-weight: 700;
            color: var(--text-main);
            padding: 0.3rem 0 0.4rem;
        }

        .posted-date {
            font-size: 0.85rem;
            color: rgba(136, 146, 176, 0.95);
            font-weight: 400;
            text-align: right;
        }

        .meta-link {
            display: inline-block;
            padding: 0.45rem 0.9rem;
            border-radius: 999px;
            border: none;
            background-color: var(--accent-blue);
            color: #001018;
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .meta-link:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }

        .contact-btn {
            display: block;
            width: 100%;
            padding: 0.8rem 0;
            background-color: transparent;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }

        .contact-btn:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }

        /* Addition 2: Update Backdrop to handle scrolling and top-alignment */
        .detail-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(2, 12, 27, 0.8);
            display: none;
            align-items: flex-start; /* Start at top for scrolling */
            justify-content: center;
            z-index: 1500;
            overflow-y: auto; /* Enable scroll on backdrop */
            padding: 2rem 0;  /* Padding so modal doesn't touch edges */
        }

        .detail-backdrop.is-open {
            display: flex;
        }

        .detail-modal {
            background: var(--light-blue);
            border-radius: 16px;
            max-width: 900px;
            width: min(90vw, 900px);
            /* Removed fixed height constraint to allow natural scrolling */
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.4fr);
            overflow: hidden;
            border: 1px solid rgba(100, 255, 218, 0.35);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
            align-items: stretch;
            position: relative;
        }

        .detail-image-wrap {
            background: #000;
            aspect-ratio: 3 / 4;
        }

        .detail-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .detail-content {
            padding: 1.5rem 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .detail-title {
            margin: 0;
            font-size: 1.5rem;
        }

        .detail-price {
            margin: 0;
            color: var(--accent-blue);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .detail-description {
            margin-top: 0.5rem;
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .detail-meta-row {
            font-size: 0.85rem;
            color: rgba(136, 146, 176, 0.95);
        }

        .detail-contact {
            margin-top: 0.75rem;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .detail-contact .meta-link {
            padding: 0.25rem 0.6rem;
        }

        .detail-email {
            font-size: 0.8rem;
            color: var(--text-dim);
            word-break: break-all;
            line-height: 1.4;
        }

        .detail-close {
            position: absolute;
            top: 0.75rem;
            right: 1rem;
            background: rgba(10, 25, 47, 0.5); /* Slight bg for visibility */
            border-radius: 50%;
            width: 30px;
            height: 30px;
            border: none;
            color: var(--text-dim);
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 10;
        }

        .detail-close:hover {
            color: var(--accent-blue);
        }

        @media (max-width: 768px) {
            .detail-modal {
                grid-template-columns: minmax(0, 1fr);
                max-width: 95vw;
            }

            .detail-content {
                padding: 1.25rem 1.25rem 1.5rem;
            }
        }

        #loading { 
            text-align: center; 
            width: 100%; 
            grid-column: 1/-1; 
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--accent-blue);
        }

        @media (max-width: 800px) {
            .container {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1.25rem;
                margin: 1rem auto;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 0.6rem 0.8rem;
                gap: 0.5rem;
            }

            .brand h1 {
                font-size: 1.3rem;
                letter-spacing: 1px;
            }

            .brand .subtitle {
                font-size: 0.8rem;
            }

            .header-actions {
                width: 100%;
                flex-wrap: nowrap;
                justify-content: space-between;
                gap: 0.4rem;
            }

            .header-actions a {
                flex: 1;
                text-align: center;
                font-size: 0.8rem;
                padding: 0.35rem 0.4rem;
            }
        }

        @media (max-width: 420px) {
            .brand h1,
            .brand .subtitle {
                display: none;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <h1>OLIN SELLS</h1>
        <p class="subtitle">Campus Marketplace MVP</p>
    </div>
    <div class="header-actions">
      <a
        class="sheet-link"
        href="https://docs.google.com/spreadsheets/d/1mtEPmFUPAOKuYkGwr9zl8f1lAaOpt8skmTvANqJe49Y/edit"
        target="_blank"
        rel="noopener noreferrer"
      >View Listing Spreadsheet</a>
      <a
        class="upload-link"
        href="https://docs.google.com/forms/u/0/d/e/1FAIpQLSfMfqlYGRJI_LrSlkTDkjyR75JHqUPSUjHDIee7M1deZP1z9A/viewform?usp=form_confirm"
        target="_blank"
        rel="noopener noreferrer"
      >Post an item</a>
    </div>
</header>

<div id="status"></div>

<div class="container" id="image-container">
    <div id="loading">Searching for items...</div>
</div>

<div class="detail-backdrop" id="detail-backdrop" aria-hidden="true">
  <div class="detail-modal" role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <div class="detail-image-wrap">
      <img id="detail-image" class="detail-image" alt="">
    </div>
    <div class="detail-content">
      <button class="detail-close" type="button" aria-label="Close detail view">&times;</button>
      <h2 id="detail-title" class="detail-title"></h2>
      <p id="detail-price" class="detail-price"></p>
      <p id="detail-description" class="detail-description"></p>
      <div class="detail-contact">
        <a id="detail-inquire" class="meta-link" href="#">Inquire</a>
        <span id="detail-or-email" class="detail-email">
          or email <span id="detail-email"></span>
        </span>
      </div>
      <p id="detail-date" class="detail-meta-row"></p>
    </div>
  </div>
</div>

<script>
  function formatPrice(rawPrice) {
    if (rawPrice == null) return '';
    const trimmed = String(rawPrice).trim();
    if (!trimmed) return '';

    const numeric = Number(String(trimmed).replace(/[^0-9.-]/g, ''));
    if (!Number.isFinite(numeric)) return trimmed;

    const hasCents = Math.abs(numeric % 1) > 1e-9;
    return new Intl.NumberFormat('en-US', {
      style: 'currency',
      currency: 'USD',
      minimumFractionDigits: hasCents ? 2 : 0,
      maximumFractionDigits: hasCents ? 2 : 0,
    }).format(numeric);
  }

  function formatPostedDayOnly(timestamp) {
    if (timestamp == null) return '';
    const t = String(timestamp).trim();
    if (!t) return '';
    if (t.includes(' ')) return t.split(' ')[0];
    if (t.includes('T')) return t.split('T')[0];
    return t;
  }

  function setupDetailModal() {
    const backdrop = document.getElementById('detail-backdrop');
    const imgEl = document.getElementById('detail-image');
    const titleEl = document.getElementById('detail-title');
    const priceEl = document.getElementById('detail-price');
    const descEl = document.getElementById('detail-description');
    const dateEl = document.getElementById('detail-date');
    const inquireEl = document.getElementById('detail-inquire');
    const emailEl = document.getElementById('detail-email');
    const closeBtn = backdrop.querySelector('.detail-close');

    function close() {
      backdrop.classList.remove('is-open');
      backdrop.setAttribute('aria-hidden', 'true');
      // Addition 3a: Re-enable scrolling on body
      document.body.classList.remove('modal-open');
    }

    function open(data) {
      if (!backdrop) return;
      titleEl.textContent = data.name || '';
      priceEl.textContent = data.price || '';
      descEl.textContent = data.description || '';
      dateEl.textContent = data.date ? `Posted ${data.date}` : '';

       const email = data.email || '';
       emailEl.textContent = email;
       if (email) {
         const subject = encodeURIComponent('Olin Sells: Interested in buying ' + (data.name || ''));
         inquireEl.href = `mailto:${email}?subject=${subject}`;
         inquireEl.style.display = '';
       } else {
         inquireEl.removeAttribute('href');
         inquireEl.style.display = 'none';
       }

      if (data.imageUrl) {
        imgEl.src = data.imageUrl;
        imgEl.alt = data.name || 'Listing image';
      } else {
        imgEl.removeAttribute('src');
        imgEl.alt = '';
      }

      backdrop.classList.add('is-open');
      backdrop.setAttribute('aria-hidden', 'false');
      
      // Addition 3b: Prevent background scrolling and reset modal scroll to top
      document.body.classList.add('modal-open');
      backdrop.scrollTop = 0; 
    }

    backdrop.addEventListener('click', (event) => {
      if (event.target === backdrop) {
        close();
      }
    });

    closeBtn.addEventListener('click', close);

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        close();
      }
    });

    return { open, close };
  }

  async function fetchData() {
    const sheetId = '1mtEPmFUPAOKuYkGwr9zl8f1lAaOpt8skmTvANqJe49Y'; 
    const apiKey = 'AIzaSyBasUwah0wqiz_OHSCiLyr5YgP1HeiShZU'; 
    const range = 'Listings!A:H'; 

    const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?key=${apiKey}`;

    try {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }

      const data = await response.json();
      const rows = data.values;

      if (!rows) {
        console.error('No data found in the specified range.');
        return;
      }

      const container = document.getElementById('image-container');
      container.innerHTML = ''; 

      const detail = setupDetailModal();

      rows.slice(1).forEach(row => {
        const productName = row[1];
        if (!productName) return; 

        const timestamp = row[0];
        const sellerName = row[2];
        const sellerEmail = row[3];
        const price = row[5];
        const productDescription = row[6];
        const imageUrl = row[7]; 

        const card = document.createElement('div');
        card.className = 'card';

        const formattedPrice = formatPrice(price);
        const formattedDate = formatPostedDayOnly(timestamp);

        card.dataset.productName = productName || '';
        card.dataset.description = productDescription || '';
        card.dataset.date = formattedDate || '';
        card.dataset.price = formattedPrice || '';
        card.dataset.imageUrl = imageUrl || '';
        card.dataset.email = sellerEmail || '';

        const cardContent = `
          <div class="card-content">
            <div class="card-header">
              <h3 class="card-title">${productName}</h3>
              <p class="price">${formattedPrice}</p>
            </div>
            <div class="card-meta">
              <div class="card-meta-top">
                <div class="seller-name">${sellerName}</div>
                <div class="posted-date">${formattedDate}</div>
              </div>
              <div class="detail-contact">
                <a class="meta-link" href="mailto:${sellerEmail}?subject=${encodeURIComponent('Olin Sells: Interested in buying ' + productName)}">Inquire</a>
                <span class="detail-email">
                  or email <span>${sellerEmail}</span>
                </span>
              </div>
            </div>
          </div>
        `;

        card.innerHTML = cardContent;

        if (imageUrl) {
          const img = document.createElement('img');
          img.src = imageUrl;
          img.alt = productName;
          img.className = 'card-img';
          card.prepend(img); 
        }

        card.addEventListener('click', (event) => {
          if (event.target.closest('.meta-link')) return;
          if (!detail) return;
          detail.open({
            name: card.dataset.productName,
            description: card.dataset.description,
            date: card.dataset.date,
            price: card.dataset.price,
            imageUrl: card.dataset.imageUrl,
            email: card.dataset.email,
          });
        });

        container.appendChild(card);
      });
    } catch (error) {
      console.error('Error fetching data:', error);
    }
  }

  fetchData();
</script>

</body>
</html>
