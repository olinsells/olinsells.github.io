<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olin Sells | Marketplace</title>
    <style>
        :root {
            --dark-blue: #0a192f;
            --light-blue: #112240;
            --accent-blue: #64ffda;
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-blue);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--light-blue);
            padding: 1rem 1.25rem;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-bottom: 2px solid var(--accent-blue);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            min-width: 0;
        }

        h1 { margin: 0; color: var(--accent-blue); letter-spacing: 1.5px; font-size: 1.6rem; line-height: 1.1; }
        p.subtitle { color: var(--text-dim); margin: 0; font-weight: 300; font-size: 0.95rem; }

        .upload-link {
            display: inline-block;
            padding: 0.55rem 0.9rem;
            border: 1px solid var(--accent-blue);
            border-radius: 6px;
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 700;
            white-space: nowrap;
            transition: 0.25s ease;
        }

        .upload-link:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .sheet-link {
            display: inline-block;
            padding: 0.55rem 0.9rem;
            border: 1px solid rgba(100, 255, 218, 0.55);
            border-radius: 6px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            white-space: nowrap;
            transition: 0.25s ease;
            background-color: rgba(100, 255, 218, 0.06);
        }

        .sheet-link:hover {
            border-color: var(--accent-blue);
            background-color: rgba(100, 255, 218, 0.12);
        }

        .container {
            max-width: 1800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            /* fluid grid - cards will be at least 300px wide 
              but will expand to fill the remaining space. */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--light-blue);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(100, 255, 218, 0.1);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-blue);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 3 / 4; /* portrait 4x3: width:height = 3:4 */
            object-fit: cover;
            background-color: #000;
            display: block;
        }

        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .card-title {
            margin: 0;
            font-size: 1.2rem;
            line-height: 1.2;
            min-width: 0;
            text-align: left;
        }

        .price {
            color: var(--accent-blue);
            font-size: 1.4rem;
            font-weight: bold;
            margin: 0;
            text-align: right;
            white-space: nowrap;
        }

        h3 { margin: 0.5rem 0; font-size: 1.2rem; }

        .description {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0.25rem 0 0.75rem;
            flex-grow: 1;
        }

        .card-meta {
            margin-top: 0.5rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(136, 146, 176, 0.4);
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .seller-name {
            font-weight: 700;
            color: var(--text-main);
        }

        .posted-date {
            font-size: 0.8rem;
            color: rgba(136, 146, 176, 0.95);
        }

        .meta-link {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .meta-link:hover {
            text-decoration: underline;
        }

        .contact-btn {
            display: block;
            width: 100%;
            padding: 0.8rem 0;
            background-color: transparent;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }

        .contact-btn:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }

        #loading { 
            text-align: center; 
            width: 100%; 
            grid-column: 1/-1; 
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--accent-blue);
        }

        /* Tablet and Mobile Adjustments */
        @media (max-width: 800px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                padding: 1.5rem;
            }

            .header-actions {
                width: 100%;
                justify-content: flex-start;
                margin-top: 1rem;
            }

            /* Makes buttons easier to tap on smaller screens */
            .header-actions a {
                flex: 1;
                text-align: center;
            }

            .container {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1.25rem;
                margin: 1rem auto;
            }
        }

        /* Extra small screens (Phones) */
        @media (max-width: 480px) {
            .header-actions {
                flex-direction: column;
                align-items: stretch;
            }
            
            .price {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <h1>OLIN SELLS</h1>
        <p class="subtitle">Campus Marketplace MVP</p>
    </div>
    <div class="header-actions">
      <a
        class="sheet-link"
        href="https://docs.google.com/spreadsheets/d/1mtEPmFUPAOKuYkGwr9zl8f1lAaOpt8skmTvANqJe49Y/edit"
        target="_blank"
        rel="noopener noreferrer"
      >View Listing Spreadsheet</a>
      <a
        class="upload-link"
        href="https://docs.google.com/forms/u/0/d/e/1FAIpQLSfMfqlYGRJI_LrSlkTDkjyR75JHqUPSUjHDIee7M1deZP1z9A/viewform?usp=form_confirm"
        target="_blank"
        rel="noopener noreferrer"
      >Post an item</a>
    </div>
</header>

<div id="status"></div>

<div class="container" id="image-container">
    <div id="loading">Searching for items...</div>
</div>

<script>
  function formatPrice(rawPrice) {
    if (rawPrice == null) return '';
    const trimmed = String(rawPrice).trim();
    if (!trimmed) return '';

    const numeric = Number(String(trimmed).replace(/[^0-9.-]/g, ''));
    if (!Number.isFinite(numeric)) return trimmed;

    const hasCents = Math.abs(numeric % 1) > 1e-9;
    return new Intl.NumberFormat('en-US', {
      style: 'currency',
      currency: 'USD',
      minimumFractionDigits: hasCents ? 2 : 0,
      maximumFractionDigits: hasCents ? 2 : 0,
    }).format(numeric);
  }

  function formatPostedDayOnly(timestamp) {
    if (timestamp == null) return '';
    const t = String(timestamp).trim();
    if (!t) return '';

    // Google Forms timestamps are commonly "M/D/YYYY HH:MM:SS".
    // If we can safely strip time, do so; otherwise fall back to the raw value.
    if (t.includes(' ')) return t.split(' ')[0];
    if (t.includes('T')) return t.split('T')[0];
    return t;
  }

  async function fetchData() {
    const sheetId = '1mtEPmFUPAOKuYkGwr9zl8f1lAaOpt8skmTvANqJe49Y'; // Replace with your Google Sheet ID
    const apiKey = 'AIzaSyBasUwah0wqiz_OHSCiLyr5YgP1HeiShZU'; // Replace with your API key
    const range = 'Listings!A:H'; // Adjust range to include column 8

    const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?key=${apiKey}`;

    try {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }

      const data = await response.json();
      const rows = data.values;

      if (!rows) {
        console.error('No data found in the specified range.');
        return;
      }

      const container = document.getElementById('image-container');
      container.innerHTML = ''; // Clear loading message

      rows.slice(1).forEach(row => {
        const productName = row[1];
        if (!productName) return; // Skip listing if the product name is blank

        const timestamp = row[0];
        const sellerName = row[2];
        const sellerEmail = row[3];
        const price = row[5];
        const productDescription = row[6];
        const imageUrl = row[7]; // Get the image URL from column 8

        const card = document.createElement('div');
        card.className = 'card';

        const cardContent = `
          <div class="card-content">
            <div class="card-header">
              <h3 class="card-title">${productName}</h3>
              <p class="price">${formatPrice(price)}</p>
            </div>
            <p class="description">${productDescription}</p>
            <div class="card-meta">
              <div class="seller-name">${sellerName}</div>
              <div>
                <a class="meta-link" href="mailto:${sellerEmail}">${sellerEmail}</a>
              </div>
              <div class="posted-date">${formatPostedDayOnly(timestamp)}</div>
            </div>
          </div>
        `;

        card.innerHTML = cardContent;

        if (imageUrl) {
          const img = document.createElement('img');
          img.src = imageUrl;
          img.alt = productName;
          img.className = 'card-img';
          card.prepend(img); // Add the image at the top of the card
        }

        container.appendChild(card);
      });
    } catch (error) {
      console.error('Error fetching data:', error);
    }
  }

  // Fetch data on page load
  fetchData();
</script>

</body>
</html>
