<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olin Sells | Marketplace</title>
    <style>
        :root {
            --dark-blue: #0a192f;
            --light-blue: #112240;
            --accent-blue: #64ffda;
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-blue);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--light-blue);
            padding: 2.5rem 1rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-bottom: 2px solid var(--accent-blue);
        }

        h1 { margin: 0; color: var(--accent-blue); letter-spacing: 2px; font-size: 2.5rem; }
        p.subtitle { color: var(--text-dim); margin-top: 0.5rem; font-weight: 300; }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--light-blue);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(100, 255, 218, 0.1);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-blue);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .card-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background-color: #000;
        }

        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .price {
            color: var(--accent-blue);
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        h3 { margin: 0.5rem 0; font-size: 1.2rem; }

        .description {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .contact-btn {
            display: block;
            width: 100%;
            padding: 0.8rem 0;
            background-color: transparent;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }

        .contact-btn:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }

        #loading { 
            text-align: center; 
            width: 100%; 
            grid-column: 1/-1; 
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--accent-blue);
        }
    </style>
</head>
<body>

<header>
    <h1>OLIN SELLS</h1>
    <p class="subtitle">Campus Marketplace MVP</p>
</header>

<form id="product-form">
  <label for="product-name">Product Name:</label>
  <input type="text" id="product-name" name="product-name" required>

  <label for="product-image">Upload Image:</label>
  <input type="file" id="product-image" name="product-image" accept="image/*" required>

  <button type="submit">Submit</button>
</form>
<div id="status"></div>

<div class="container" id="image-container">
    <div id="loading">Searching for items...</div>
</div>

<script>
  const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/damwgsukr/image/upload'; // Replace YOUR_CLOUD_NAME
  const CLOUDINARY_UPLOAD_PRESET = 'unsigned_upload'; // Replace YOUR_UPLOAD_PRESET

  document.getElementById('product-form').addEventListener('submit', async (event) => {
    event.preventDefault();

    const statusDiv = document.getElementById('status');
    statusDiv.textContent = 'Uploading...';

    const productName = document.getElementById('product-name').value;
    const productImage = document.getElementById('product-image').files[0];

    if (!productImage) {
      statusDiv.textContent = 'Please upload an image.';
      return;
    }

    try {
      // Upload image to Cloudinary
      const formData = new FormData();
      formData.append('file', productImage);
      formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

      const cloudinaryResponse = await fetch(CLOUDINARY_URL, {
        method: 'POST',
        body: formData,
      });

      const cloudinaryData = await cloudinaryResponse.json();
      if (!cloudinaryData.secure_url) {
        throw new Error('Image upload failed.');
      }

      const imageUrl = cloudinaryData.secure_url;

      // Add the image URL to your product listing logic
      console.log('Image uploaded successfully:', imageUrl);
      statusDiv.textContent = 'Image uploaded successfully!';
    } catch (error) {
      console.error(error);
      statusDiv.textContent = 'An error occurred. Please try again.';
    }
  });

  async function fetchData() {
    const sheetId = '1mtEPmFUPAOKuYkGwr9zl8f1lAaOpt8skmTvANqJe49Y'; // Replace with your Google Sheet ID
    const apiKey = 'AIzaSyBasUwah0wqiz_OHSCiLyr5YgP1HeiShZU'; // Replace with your API key
    const range = 'Listings!A:G'; // Adjust range to match your sheet structure

    const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?key=${apiKey}`;

    try {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }

      const data = await response.json();
      const rows = data.values;

      if (!rows) {
        console.error('No data found in the specified range.');
        return;
      }

      const container = document.getElementById('image-container');
      container.innerHTML = ''; // Clear loading message

      rows.slice(2).forEach(row => {
        const productName = row[1];
        if (!productName) return; // Skip listing if the product name is blank

        const timestamp = row[0];
        const sellerName = row[2];
        const sellerEmail = row[3];
        const price = row[5];
        const productDescription = row[6];

        const card = document.createElement('div');
        card.className = 'card';

        const cardContent = `
          <div class="card-content">
            <p class="price">$${price}</p>
            <h3>${productName}</h3>
            <p class="description">${productDescription}</p>
            <p><strong>Seller:</strong> ${sellerName}</p>
            <p><strong>Contact:</strong> <a href="mailto:${sellerEmail}">${sellerEmail}</a></p>
            <p><strong>Posted:</strong> ${timestamp}</p>
          </div>
        `;

        card.innerHTML = cardContent;
        container.appendChild(card);
      });
    } catch (error) {
      console.error('Error fetching data:', error);
    }
  }

  // Fetch data on page load
  fetchData();

  function onFormSubmit(e) {
    const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    const row = e.values; // Get the submitted row data
    const rowIndex = sheet.getLastRow(); // Get the index of the last row

    // Check if the row has enough columns and the Google Drive link exists
    if (!row || row.length < 5 || !row[4]) {
      Logger.log(`Row ${rowIndex} is missing the Google Drive link. Skipping.`);
      return;
    }

    const driveLink = row[4]; // Assuming the Google Drive link is in the 5th column
    const cloudinaryUrlColumn = 7; // Column to store the Cloudinary URL (adjust as needed)

    try {
      // Extract the file ID from the Google Drive link
      const fileId = extractFileId(driveLink);
      if (!fileId) {
        Logger.log(`No file ID found for row ${rowIndex}. Skipping.`);
        return;
      }

      // Get the file as a blob
      const file = DriveApp.getFileById(fileId);
      const blob = file.getBlob();

      // Upload the file to Cloudinary
      const response = UrlFetchApp.fetch(CLOUDINARY_URL, {
        method: 'post',
        payload: {
          file: blob,
          upload_preset: CLOUDINARY_UPLOAD_PRESET,
        },
      });

      const cloudinaryData = JSON.parse(response.getContentText());
      const cloudinaryUrl = cloudinaryData.secure_url;

      if (!cloudinaryUrl) {
        Logger.log(`Cloudinary upload failed for row ${rowIndex}.`);
        return;
      }

      // Update the sheet with the Cloudinary URL
      sheet.getRange(rowIndex, cloudinaryUrlColumn).setValue(cloudinaryUrl);
      Logger.log(`Cloudinary URL inserted for row ${rowIndex}: ${cloudinaryUrl}`);
    } catch (error) {
      Logger.log(`Error processing row ${rowIndex}: ${error.message}`);
    }
  }

  function extractFileId(driveink) {
    const match = driveLink.match(/[-\w]{25,}/);
    return match ? match[0] : null;
  }
</script>

</body>
</html>
