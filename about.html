<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Olin Sells</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --dark-blue: #0a192f;
            --light-blue: #112240;
            --accent-blue: #64ffda;
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
        }
        body {
            font-family: "Helvetica", Arial, sans-serif;
            background-color: var(--dark-blue);
            color: var(--text-main);
            margin: 0; padding: 2rem;
            line-height: 1.6;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .back-btn {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: bold;
            border: 1px solid var(--accent-blue);
            padding: 0.5rem 1rem;
            border-radius: 6px;
        }
        .back-btn:hover { background: rgba(100, 255, 218, 0.1); }
        #content h1, #content h2 { color: var(--accent-blue); }
        #content a { color: var(--accent-blue); }
    </style>
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JM0999HQ7V"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-JM0999HQ7V');
</script>


<body>
    <div class="container">
        <a href="index.html" class="back-btn">&larr; Back to Marketplace</a>
        <div id="content">Loading instructions...</div>
    </div>

    <script>
        async function loadAbout() {
            try {
                const response = await fetch('instructions.md');
                const text = await response.text();
                document.getElementById('content').innerHTML = marked.parse(text);
            } catch (e) {
                document.getElementById('content').innerHTML = "Error loading instructions.md";
            }
        }
        loadAbout();
    </script>
</body>
</html>
